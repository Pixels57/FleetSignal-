services:
  rabbitmq:
    image: rabbitmq:3-management
    container_name: fleet-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: fleet
      RABBITMQ_DEFAULT_PASS: fleetpass
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    restart: unless-stopped

volumes:
  rabbitmq_data: